<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cenário de Teste</title>
    <link rel="stylesheet" href="/style/styleCenario.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

    <script src="/js/scriptHome.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>


  </head>
  <body id="cenarioTestehtml">
    <div id="head">
      <h1>Cenário de Teste - </h1>

      <div id="content-head">
        <div class="head-grid">
          <div class="field">
            <label>Ticket Movidesk</label>
            <input type="text" id="inputTicket" maxlength="6" />
          </div>

          <div class="field">
            <label>Dev Responsável</label>
            <select id="devResp">
              <option></option>
              <option>Eduardo Coimbra (FranFlow)</option>
              <option>Francine Andrade (FranFlow)</option>
              <option>Marco Silva (FranFlow)</option>
              <option>Luckas Delboni (FranFlow)</option>
            </select>
          </div>

          <div class="field">
            <label>Data</label>
            <input type="date" />
          </div>
        </div>

        <!-- ----------------- Pré-Condições ----------------------- -->

        <div class="pre-condicoes-container">
          <div class="pre-condicoes-header">
            <span>Pré-Condições</span>
            <button type="button" class="btn-add-pre">
              <i class="ph ph-plus"></i>
            </button>
          </div>

          <table class="pre-condicoes-table">
            <thead>
              <tr>
                <th style="width: 50px">#</th>
                <th>Descrição</th>
                <th style="width: 50px"></th>
              </tr>
            </thead>
            <tbody id="preCondicoesBody">
              <tr>
                <td>1</td>
                <td>
                  <input
                    type="text"
                    placeholder="Ex: Testar em empresa estrangeira"
                  />
                </td>
                <td>
                  <button type="button" class="btn-delete">
                    <i class="ph ph-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="tabelaCenarios">
        <thead>
          <tr>
            <th></th>
            <th>ID</th>
            <th>Cenario</th>
            <th>Criterios de Aceite</th>
            <th>Passos</th>
            <th>Prioridade</th>
            <th>Dificuldade</th>
            <th>Evidencias</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  
  <div class="buttons">
    <button type="button" id="gerarCena">Gerar Cenário</button>    
    <button type="button" id="btnAbrirModal">+ Adicionar Cenário</button>
  </div>
 
  <!-- Modal -->
  <div id="overlayModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span>Adicionar Cenário</span>
        <button type="button" id="btnFecharModal" class="modal-close">&times;</button>
      </div>
 
      <div class="modal-body">

        <div style="display: flex;gap: 20px;">
          <div class="modal-field">
            <label>ID</label>
            <input type="text" style="width: 70px;" id="modalIdProces" readonly />
          </div>
          <div class="modal-field">
            <label>Processo</label>
            <input type="text"  style="width: 300px;" id="modalProcesso" readonly />
          </div>
        </div>
        
        <div class="modal-field">
          <label>Cenário <span class="obrig">*</span></label>
          <input type="text" id="modalCenario" placeholder="Descreva o cenário" />
        </div>
 
        <div class="modal-field">
          <label>Critério de Aceite <span class="obrig">*</span></label>
          <textarea id="modalCriterioAceite" rows="3" placeholder="Descreva os critérios de aceite"></textarea>
        </div>
 
        <div class="modal-field">
          <label>Passos <span class="obrig">*</span></label>
          <div id="modalPassosLista"></div>
          <button type="button" id="btnAddPasso" class="btn-add-passo">+ Adicionar passo</button>
        </div>
 
        <div class="modal-field">
          <label>Prioridade <span class="obrig">*</span></label>
          <select id="modalPrioridade">
            <option value="">Selecione...</option>
            <option value="Alta">Alta</option>
            <option value="Média">Média</option>
            <option value="Baixa">Baixa</option>
          </select>
        </div>
 
        <div class="modal-field">
          <label>Dificuldade <span class="obrig">*</span></label>
          <select id="modalDificuldade">
            <option value="">Selecione...</option>
            <option value="Alta">Alta</option>
            <option value="Média">Média</option>
            <option value="Baixa">Baixa</option>
          </select>
        </div>
      </div>
 
      <div class="modal-footer">
        <button type="button" id="btnCancelarModal" class="btn-cancelar">Cancelar</button>
        <button type="button" id="btnSalvarCenario" class="btn-salvar">Salvar</button>
      </div>
    </div>
  </div>

  </body>
</html>
